<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Artwork</title>
  <style>
    html,body{ margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
    canvas{ display:block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script>
    function setup() {
        createCanvas(windowWidth, windowHeight);
        colorMode(HSB, 360, 100, 100, 100);
        noFill();
        ellipseMode(RADIUS);
        background(0); // Set the background to black
    }

    function draw() {
        // Optional: drawDynamicBackground(frameCount * 0.02); // Comment this if you want a static black background
        translate(width / 2, height / 2);
        let s = min(width, height) / 380;
        scale(s);

        let mouseAngle = atan2(mouseY - height / 2, mouseX - width / 2);
        drawAnimatedHyperbolicLines(frameCount * 0.1, mouseAngle);

        drawBoundaryCircle(frameCount * 0.1);
    }

    function drawAnimatedHyperbolicLines(frameCount, mouseAngle) {
        let nLines = 15;
        let angleStep = TWO_PI / nLines;

        for (let i = 0; i < nLines; i++) {
            let dynamicOffset = sin(frameCount * 0.0005 + i * 0.02) * 100;
            let angle = i * angleStep + mouseAngle;

            for (let j = 0; j < 30; j++) {
                let offset = map(j, 0, 29, 0, PI / 6) + dynamicOffset;
                let startAngle = angle + offset;
                let endAngle = angle + PI - offset;
                let controlRadius = 2 + j * 6;
                
                let hueShift = (frameCount * 0.1 + j * 20) % 360;
                stroke(hueShift, 80, 100); // Adjust color brightness or saturation as needed
                strokeWeight(j * 0.01 + 0.01);
                drawCurvedHyperbolicLine(controlRadius, startAngle, endAngle);
            }
        }
    }

    function drawCurvedHyperbolicLine(controlRadius, startAngle, endAngle) {
        let startX = controlRadius * cos(startAngle);
        let startY = controlRadius * sin(startAngle);
        let endX = controlRadius * cos(endAngle);
        let endY = controlRadius * sin(endAngle);

        let cp1X = controlRadius * cos(startAngle + PI / 4);
        let cp1Y = controlRadius * sin(startAngle + PI / 4);
        let cp2X = controlRadius * cos(endAngle - PI / 4);
        let cp2Y = controlRadius * sin(endAngle - PI / 4);

        noFill();
        bezier(startX, startY, cp1X, cp1Y, cp2X, cp2Y, endX, endY);
    }

    function drawBoundaryCircle(frameCount) {
        let pulse = sin(frameCount) * 0 + 0;
        strokeWeight(0);
        stroke(255, 100, 100, 100); // Make sure this is visible against black
        ellipse(0, 0, pulse, pulse);
    }
  </script>
</body>
</html>
