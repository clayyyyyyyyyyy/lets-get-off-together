<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Circles</title>
  <style>
    html,body{ margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
    canvas{ display:block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script>
    let step = 10; // Grid spacing
    let time = 0;
    let waveFactor = 0.035;
    let cx = 0; 
    let cy = 0;
    let targetCx = 0;
    let targetCy = 0;
    let followMouse = false;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      noFill();
      colorMode(HSB, 360, 100, 100, 100);
      strokeWeight(1);
    }

    function draw() {
      // Transparent fill for smooth trails
      noStroke();
      fill(0, 0, 0, 15);
      rect(0, 0, width, height);
      
      strokeWeight(1); // Reset stroke for drawing
      translate(width / 2, height / 2);
      
      // ... rest of your code
      // If not interacting, orbit the center
      if (!followMouse) {
        targetCx = 200 * sin(time * 0.3);
        targetCy = 200 * cos(time * 0.2);
      }
      
      // Smooth transition toward target (either orbit or touch point)
      cx = lerp(cx, targetCx, 0.05);
      cy = lerp(cy, targetCy, 0.05);
      
      let hueShift = (time * 30) % 360;
      
      for (let x = -width / 2; x < width / 2; x += step) {
        for (let y = -height / 2; y < height / 2; y += step) {
          let d = dist(x, y, cx, cy) + 0.0001;
          let wave = sin(d * waveFactor + time) * cos(x * waveFactor + y * waveFactor);
          let hue = (map(wave, -1, 1, 0, 360) + hueShift) % 360;
          stroke(hue, 100, 100, 80);
          let radius = map(wave, -1, 1, 2, 20) + 5 * sin(time + d * 0.01);
          ellipse(x, y, radius);
        }
      }
      
      time += 0.02;
    }

    function touchMoved() {
      targetCx = mouseX - width / 2;
      targetCy = mouseY - height / 2;
      followMouse = true;
      return false; // Prevent default touch behavior
    }

    function mouseMoved() {
      targetCx = mouseX - width / 2;
      targetCy = mouseY - height / 2;
      followMouse = true;
    }

    function touchEnded() {
      followMouse = false;
    }

    function mouseReleased() {
      followMouse = false;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
